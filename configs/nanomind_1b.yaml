# Nanomind 1B 模型配置
# 基于 Chinchilla scaling law 设计

# 模型架构
model:
  vocab_size: 32000
  hidden_size: 2048
  intermediate_size: 5504
  num_hidden_layers: 22
  num_attention_heads: 32
  num_key_value_heads: 4  # GQA (Grouped Query Attention)
  hidden_act: "silu"
  max_position_embeddings: 4096
  initializer_range: 0.02
  rms_norm_eps: 1.0e-6
  use_cache: true
  tie_word_embeddings: false
  rope_theta: 10000.0
  attention_dropout: 0.0

# 训练配置
training:
  output_dir: "./output/nanomind-1b"
  
  # 训练数据量 (Chinchilla optimal: 20 tokens per parameter)
  # 1B 模型 = 20B tokens
  max_steps: 19531  # 20B / (512 * 2048) ≈ 19531 steps
  
  # Batch size 配置
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  
  # 序列长度
  max_seq_length: 2048
  
  # 优化器参数
  learning_rate: 3.0e-4
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  
  # 学习率调度
  warmup_ratio: 0.01  # 1% warmup
  lr_scheduler_type: "cosine"
  
  # 梯度检查点 (节省内存)
  gradient_checkpointing: true
  
  # 混合精度
  fp16: true
  bf16: false  # A100/H100 可设为 true
  
  # 日志与保存
  logging_steps: 100
  save_steps: 1000
  eval_steps: 500
  save_total_limit: 3
  logging_first_step: true
  
  # 评估
  evaluation_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  
  # DeepSpeed 配置
  deepspeed: "configs/ds_config_zero2.json"
  
  # WandB
  report_to: "wandb"
  run_name: "nanomind-1b-chinchilla"
  
  # 其他
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false

# 数据配置
data:
  train_file: "data/processed/train.jsonl"
  validation_file: "data/processed/val.jsonl"
  validation_split_percentage: 1  # 1% 用于验证
  max_seq_length: 2048
  preprocessing_num_workers: 8
  overwrite_cache: false

# Tokenizer 配置
tokenizer:
  name_or_path: "data/tokenizer"  # 本地 tokenizer 路径
  padding_side: "right"
  truncation_side: "right"
  model_max_length: 2048

# 模型保存
save:
  push_to_hub: false
  hub_model_id: null
  hub_token: null
