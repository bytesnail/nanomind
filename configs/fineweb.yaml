# 数据路径和批处理
data:
  path: "data/datasets/HuggingFaceFW/fineweb-edu/data"
  batch_size: 5000

# 处理配置
processing:
  workers: 8
  limit: null  # null表示全量处理

# 输出配置
output:
  dir: "outputs/fineweb"
  log_level: "INFO"

# 统计收集选项
stats:
  collect_domain: true
  collect_score: true
  collect_int_score: true
  collect_snapshot: true
  include_doc_stats: true
  include_lang_stats: true
