# 数据路径和批处理
data:
  path: "data/datasets/HuggingFaceFW/fineweb-edu/data"
  batch_size: 1000

# 处理配置
processing:
  workers: 2
  limit: 10000  # 仅处理10k文档

# 输出配置
output:
  dir: "outputs/fineweb_quick"
  log_level: "INFO"

# 统计收集选项
stats:
  collect_domain: true
  collect_score: true
  collect_int_score: false
  collect_snapshot: false
  include_doc_stats: true
  include_lang_stats: true
